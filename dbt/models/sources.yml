version: 2

sources:
  # OLTP source (replicated via Meltano tap-postgres)
  - name: oltp
    description: Provider supervision application database (OLTP)
    database: analytics
    schema: raw
    tables:
      - name: physicians
        description: Physicians table from OLTP source via Meltano
      - name: providers
        description: Providers (NP/PA) table from OLTP source via Meltano
      - name: cases
        description: Patient cases table from OLTP source via Meltano
      - name: case_reviews
        description: Case reviews table from OLTP source via Meltano
      - name: states
        description: States reference table from OLTP source via Meltano

  # S3 source (CSV files via Meltano tap-s3-csv)
  - name: s3_landing
    description: Files from S3 landing bucket via Meltano
    database: analytics
    schema: raw
    tables:
      - name: contacts_csv
        description: HubSpot contacts CSV from S3
      - name: deals_csv
        description: HubSpot deals CSV from S3

  # HL7v2 MLLP engine source (via Meltano tap-hl7-engine / tap-rest-api-msdk)
  - name: hl7_engine
    description: HL7v2 messages received via MLLP, parsed and served as JSON by mock-hl7-engine
    database: analytics
    schema: raw
    tables:
      - name: hl7_admissions
        description: HL7v2 ADT^A01 admission messages parsed by MLLP engine
      - name: hl7_discharges
        description: HL7v2 ADT^A03 discharge messages parsed by MLLP engine
      - name: hl7_lab_results
        description: HL7v2 ORU^R01 lab result OBX segments parsed by MLLP engine

  # HubSpot API source (via Meltano tap-hubspot)
  - name: hubspot
    description: HubSpot CRM data via API
    database: analytics
    schema: raw
    tables:
      - name: contacts
        description: HubSpot contacts from API
      - name: companies
        description: HubSpot companies from API
      - name: deals
        description: HubSpot deals from API

  # EMR FHIR R4 source (via Meltano tap-rest-api-msdk)
  - name: emr
    description: EMR FHIR R4 data via REST API
    database: analytics
    schema: raw
    tables:
      - name: fhir_patients
        description: FHIR Patient resources from EMR
      - name: fhir_appointments
        description: FHIR Appointment resources from EMR
      - name: fhir_encounters
        description: FHIR Encounter resources from EMR
