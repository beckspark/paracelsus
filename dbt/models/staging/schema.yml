version: 2

models:
  - name: stg_oltp__physicians
    description: Staged physicians data from OLTP source via Meltano
    columns:
      - name: physician_id
        description: Primary key for physicians (UUID as text)
        tests:
          - unique
          - not_null
      - name: npi
        description: National Provider Identifier (10 digits)
        tests:
          - unique
          - not_null

  - name: stg_oltp__providers
    description: Staged providers (NPs/PAs) data from OLTP source via Meltano
    columns:
      - name: provider_id
        description: Primary key for providers (UUID as text)
        tests:
          - unique
          - not_null
      - name: npi
        description: National Provider Identifier
        tests:
          - unique
          - not_null
      - name: provider_type
        description: Type of provider (NP or PA)
        tests:
          - accepted_values:
              values: ['NP', 'PA']

  - name: stg_oltp__cases
    description: Staged patient cases from OLTP source via Meltano
    columns:
      - name: case_id
        description: Primary key for cases (UUID as text)
        tests:
          - unique
          - not_null
      - name: status
        description: Case status
        tests:
          - accepted_values:
              values: ['open', 'closed', 'pending_review']

  - name: stg_oltp__case_reviews
    description: Staged case reviews from OLTP source via Meltano
    columns:
      - name: review_id
        description: Primary key for reviews (UUID as text)
        tests:
          - unique
          - not_null
      - name: review_status
        description: Review status
        tests:
          - accepted_values:
              values: ['pending', 'completed', 'overdue']

  - name: stg_oltp__states
    description: Staged state reference data from OLTP source via Meltano
    columns:
      - name: state_id
        description: Primary key for states (UUID as text)
        tests:
          - unique
          - not_null
      - name: state_code
        description: Two-letter state code
        tests:
          - unique
          - not_null

  - name: stg_s3__contacts
    description: Staged HubSpot contacts from S3 CSV via Meltano
    columns:
      - name: contact_id
        description: HubSpot contact ID
        tests:
          - not_null
      - name: source_type
        description: Source identifier (always 'csv' for this model)
        tests:
          - accepted_values:
              values: ['csv']

  - name: stg_hubspot__contacts
    description: Staged HubSpot contacts from API via Meltano
    columns:
      - name: contact_id
        description: HubSpot contact ID
        tests:
          - not_null
      - name: source_type
        description: Source identifier (always 'api' for this model)
        tests:
          - accepted_values:
              values: ['api']

  - name: stg_emr__patients
    description: Staged FHIR R4 Patient resources from EMR via Meltano
    columns:
      - name: patient_id
        description: FHIR Patient resource ID
        tests:
          - unique
          - not_null
      - name: mrn
        description: Medical Record Number from FHIR identifier

  - name: stg_emr__appointments
    description: Staged FHIR R4 Appointment resources from EMR via Meltano
    columns:
      - name: appointment_id
        description: FHIR Appointment resource ID
        tests:
          - unique
          - not_null
      - name: appointment_status
        description: FHIR appointment status
        tests:
          - accepted_values:
              values: ['booked', 'fulfilled', 'cancelled', 'noshow']

  - name: stg_emr__encounters
    description: Staged FHIR R4 Encounter resources from EMR via Meltano
    columns:
      - name: encounter_id
        description: FHIR Encounter resource ID
        tests:
          - unique
          - not_null
      - name: encounter_status
        description: FHIR encounter status
        tests:
          - accepted_values:
              values: ['finished', 'in-progress', 'planned']

  - name: stg_hl7__admissions
    description: Staged HL7v2 ADT^A01 admission messages from MLLP engine via tap-hl7-engine
    columns:
      - name: message_id
        description: HL7 message control ID
        tests:
          - unique
          - not_null
      - name: patient_class
        description: Patient class (I=Inpatient, E=Emergency, O=Outpatient)
        tests:
          - accepted_values:
              values: ['I', 'E', 'O']

  - name: stg_hl7__discharges
    description: Staged HL7v2 ADT^A03 discharge messages from MLLP engine via tap-hl7-engine
    columns:
      - name: message_id
        description: HL7 message control ID
        tests:
          - unique
          - not_null
      - name: patient_class
        description: Patient class (I=Inpatient, E=Emergency, O=Outpatient)
        tests:
          - accepted_values:
              values: ['I', 'E', 'O']

  - name: stg_hl7__lab_results
    description: Staged HL7v2 ORU^R01 lab result OBX segments from MLLP engine via tap-hl7-engine
    columns:
      - name: message_id
        description: HL7 message control ID (not unique — multiple OBX per message)
        tests:
          - not_null
      - name: abnormal_flag
        description: Abnormality indicator from OBX segment
        tests:
          - accepted_values:
              values: ['N', 'L', 'H', 'LL', 'HH']
